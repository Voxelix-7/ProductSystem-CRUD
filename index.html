<!DOCTYPE html>
<html>
  <head>
    <title>Product System</title>
    <link rel="stylesheet" href="style.css">
  </head>
 <body>
   <div class="app">
    <h1>Product Manager</h1>
    <p class="subtitle">Manage your products using Js</p>

     <div class="form-box">
       <input type="text" id="productName" placeholder="Enter product name">
       <input type="number" id="productPrice" placeholder="Enter product price">
       <input type="number" id="productQuantity" placeholder="Enter product quantity">
       <button id="saveBtn">Save Product</button>
       <p id="message"></p>
     </div>

     <div class="list-box">
       <h2>Products:</h2>
       <div id="productList"></div>
     </div>

   </div>

   <script src="script.js"></script>
 </body>
</html>
